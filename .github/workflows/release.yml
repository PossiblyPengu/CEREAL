name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        run: git clone --depth 1 --branch ${{ github.ref_name }} "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" .

      - name: Install dependencies
        run: npm ci

      - name: Build MediaInfoTool
        run: |
          dotnet publish electron/native/MediaInfoTool/MediaInfoTool.csproj `
            -c Release --nologo -v quiet `
            -o electron/native/MediaInfoTool/publish

      - name: Build renderer
        run: npx tsc -b && npx vite build

      - name: Package and publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: npx electron-builder --win --publish always

name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Cache electron and build tools
        uses: actions/cache@v4
        with:
          path: |
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-electron-

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Install dependencies
        run: npm ci

      - name: Build MediaInfoTool
        run: |
          dotnet publish electron/native/MediaInfoTool/MediaInfoTool.csproj `
            -c Release --nologo -v quiet `
            -o electron/native/MediaInfoTool/publish

      - name: Build renderer
        run: npx tsc -b && npx vite build

      - name: Package and publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: npx electron-builder --win --publish always
